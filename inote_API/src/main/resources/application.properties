# Database

    # Hibernate will update the database schema to match the entity mappings. 
    # This is useful in development environments where the schema may change frequently.
    spring.jpa.hibernate.ddl-auto=create-drop 
    # Database localisation
    spring.datasource.url=jdbc:mysql://localhost:3306/inote

    # Database username
    spring.datasource.username=moch

    # Database password
    spring.datasource.password=Passer@123

    # SGBDR driver
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    # Display SQL requests on standard output
    spring.jpa.show-sql=true

    # Provide a data set with data.sql (in resources folder) at application startup
    # spring.jpa.defer-datasource-initialization=true
    # spring.sql.init.mode=always

